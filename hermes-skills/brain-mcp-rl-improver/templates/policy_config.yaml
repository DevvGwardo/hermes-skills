# Brain MCP RL Policy Configuration Template
# This file contains hyperparameters for the RL training pipeline

# PPO Configuration for Spawning Policy
ppo_spawning:
  learning_rate: 1.41e-5
  batch_size: 64
  mini_batch_size: 16
  gradient_accumulation_steps: 4
  clip_range: 0.2
  kl_coef: 0.2
  vf_coef: 0.1
  ent_coef: 0.01
  max_grad_norm: 0.5
  target_kl: 0.02

# GRPO Configuration for Task Routing Policy  
grpo_routing:
  learning_rate: 1.0e-5
  batch_size: 32
  mini_batch_size: 8
  gradient_accumulation_steps: 2
  clip_range: 0.1
  beta: 0.1  # KL penalty coefficient
  num_generations: 4  # Number of generations per prompt
  max_length: 128
  temperature: 0.7

# Training Schedule
training:
  collection_interval_hours: 4
  training_timesteps: 100000
  evaluation_interval_hours: 24
  deployment_check_interval_hours: 6

# Performance Thresholds
thresholds:
  min_improvement_percent: 5.0
  max_degradation_percent: -2.0
  min_evaluation_samples: 50
  significance_level: 0.05

# Safety Limits
safety:
  max_policy_change_percent: 10.0
  require_manual_approval: false
  rollback_on_degradation: true
  max_consecutive_degradations: 3

# Resource Limits
resources:
  max_training_hours: 4
  max_memory_gb: 8
  max_cpu_percent: 80